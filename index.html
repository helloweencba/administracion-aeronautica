<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Pedidos - Administracion - Direccion de Aeronáutica Córdoba</title>
    <style>
        :root { --azul: #003366; --verde: #27ae60; --rojo: #e74c3c; --amarillo: #f1c40f; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; }
        #login-screen { position: fixed; inset: 0; background: var(--azul); display: flex; justify-content: center; align-items: center; z-index: 2000; color: white; }
        .login-card { background: white; color: #333; padding: 40px; border-radius: 15px; text-align: center; }
        .app-container { display: none; padding: 20px; }
        .app-header { background: var(--azul); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--amarillo); }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .semaforo { padding: 5px 12px; border-radius: 20px; color: white; font-weight: bold; font-size: 12px; display: inline-block; }
        .bg-vencido { background: var(--rojo); }
        .bg-aviso { background: var(--amarillo); color: #333; }
        .bg-ok { background: var(--verde); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .status-anulado { background: #333 !important; color: white !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>SGA - Ingreso</h2>
        <select id="user-select" style="width:100%; padding:10px; margin:20px 0;">
            <option value="">Seleccione Usuario...</option>
            <option value="Federico">Federico</option>
            <option value="Lorena">Lorena</option>
            <option value="Santiago">Santiago</option>
            <option value="Andres">Andres</option>
            <option value="INGENIERIA">INGENIERÍA / TÉCNICA</option>
        </select>
        <button class="btn" style="background:var(--azul); color:white; width:100%" onclick="entrar()">INGRESAR</button>
    </div>
</div>

<div class="app-container" id="main-app">
    <header class="app-header">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="Logo aeronautica.png" id="main-logo" style="height:60px; filter: brightness(0) invert(1);" onerror="this.src='https://raw.githubusercontent.com/helloweencba/administracion-aeronautica/main/Logo%20aeronautica.png'">
            <div><h1 style="margin:0; font-size:1.2em;">Gestor de Solicitudes</h1><small id="welcome-msg"></small></div>
        </div>
        <button class="btn" style="background:var(--amarillo)" onclick="cargarDatos()">🔄 Sincronizar</button>
    </header>

    <div class="card" id="seccion-flota">
        <h3>🚢 Estado de Flota (ITV / POV / Cisterna)</h3>
        <table>
            <thead><tr><th>Patente</th><th>ITV</th><th>POV</th><th>Cisterna</th><th>Acción</th></tr></thead>
            <tbody id="cuerpoFlota"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>📋 Trazabilidad de Solicitudes</h3>
        <table id="tablaSol">
            <thead><tr><th>Datos</th><th>Detalle</th><th>Seguimiento</th><th>Estado</th><th>Acción</th></tr></thead>
            <tbody id="cuerpoSol"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwZYBhN9hKVz4e2GE2tRDTyxiRA53hA6JHtkiInORCmFZ8JwBB9nWfUIAO9YGL4Fh1A/exec";
    let USUARIO_ACTUAL = "";

    function entrar() {
        const u = document.getElementById('user-select').value;
        if (!u) return;
        USUARIO_ACTUAL = u;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Operador: " + u;
        if(u === 'INGENIERIA') document.getElementById('seccion-flota').style.display = 'none';
        cargarDatos();
    }

    function formatFecha(f) {
        if (!f || f === "-") return "-";
        // Si viene como fecha larga de JS, la limpiamos
        let d = new Date(f);
        if (isNaN(d)) return f; // Si ya es dd-mm-yyyy lo deja igual
        return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
    }

    function calcularSem(fStr) {
        const f = formatFecha(fStr);
        if (f === "-") return { c: 'bg-ok', t: '-' };
        const p = f.split('-');
        const venc = new Date(p[2], p[1]-1, p[0]);
        const diff = Math.ceil((venc - new Date())/(1000*60*60*24));
        if (diff < 0) return { c: 'bg-vencido', t: f };
        if (diff <= 45) return { c: 'bg-aviso', t: f };
        return { c: 'bg-ok', t: f };
    }

    function cargarDatos() {
        const s = document.createElement('script');
        s.src = `${WEB_APP_URL}?action=read&callback=render`;
        document.body.appendChild(s);
    }

    window.render = function(data) {
        const cF = document.getElementById('cuerpoFlota');
        cF.innerHTML = '';
        data.flota.forEach(f => {
            const i = calcularSem(f.itv), p = calcularSem(f.pov), c = calcularSem(f.cisterna);
            cF.innerHTML += `<tr><td><strong>${f.patente}</strong></td>
                <td><span class="semaforo ${i.c}">${i.t}</span></td>
                <td><span class="semaforo ${p.c}">${p.t}</span></td>
                <td><span class="semaforo ${c.c}">${c.t}</span></td>
                <td><button onclick="modFlota('${f.patente}','${i.t}','${p.t}','${c.t}')">📝</button></td></tr>`;
        });

        const cS = document.getElementById('cuerpoSol');
        cS.innerHTML = '';
        data.solicitudes.forEach(s => {
            if (USUARIO_ACTUAL === 'INGENIERIA' && s.unidad !== 'TÉCNICA') return;
            const clase = "status-" + s.estado.toLowerCase();
            cS.innerHTML += `<tr class="${clase}">
                <td><small>${s.unidad}</small><br><strong>${s.nro_sol}</strong><br><small>${formatFecha(s.f_nec)}</small></td>
                <td><div style="font-weight:bold">${s.activo}</div><div style="font-size:11px">${s.detalle}</div></td>
                <td>
                    GIP: <input type="text" id="gip_${s.nro_sol}" value="${s.gip}" style="width:60px" ${USUARIO_ACTUAL==='INGENIERIA'?'disabled':''}>
                    Prov: <input type="text" id="prv_${s.nro_sol}" value="${s.prov}" style="width:90px">
                </td>
                <td>
                    <select id="est_${s.nro_sol}">
                        <option value="PENDIENTE" ${s.estado==='PENDIENTE'?'selected':''}>PENDIENTE</option>
                        <option value="ENTREGADO" ${s.estado==='ENTREGADO'?'selected':''}>ENTREGADO</option>
                        <option value="TERMINADO" ${s.estado==='TERMINADO'?'selected':''}>TERMINADO</option>
                        <option value="ANULADO" ${s.estado==='ANULADO'?'selected':''}>ANULADO</option>
                    </select>
                </td>
                <td><button onclick="save('${s.nro_sol}')">💾</button></td></tr>`;
        });
    }

    function modFlota(pat, itv, pov, cis) {
        const ni = prompt("Nueva fecha ITV (dd-mm-yyyy):", itv);
        const np = prompt("Nueva fecha POV (dd-mm-yyyy):", pov);
        const nc = prompt("Nueva fecha Cisterna (dd-mm-yyyy):", cis);
        if(ni && np) ejecutar('updateFlota', {patente:pat, itv:ni, pov:np, cis:nc, user:USUARIO_ACTUAL});
    }

    function save(n) {
        ejecutar('update', {
            nro_sol: n, 
            gip: document.getElementById('gip_'+n).value,
            prov: document.getElementById('prv_'+n).value,
            estado: document.getElementById('est_'+n).value,
            user: USUARIO_ACTUAL
        });
    }

    function ejecutar(a, p) {
        let url = `${WEB_APP_URL}?action=${a}&callback=render`;
        for (let k in p) url += `&${k}=${encodeURIComponent(p[k])}`;
        const s = document.createElement('script'); s.src = url; document.body.appendChild(s);
    }
</script>
</body>
</html>
