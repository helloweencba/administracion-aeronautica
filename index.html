<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGA - Aeronáutica Córdoba</title>
    <style>
        :root { --azul: #1a5276; --celeste: #2980b9; --naranja: #e67e22; --verde: #27ae60; --gris: #7f8c8d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--azul); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .full { grid-column: span 2; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-main { background: var(--azul); width: 100%; margin-top: 15px; }
        .btn-action { font-size: 0.7em; padding: 5px; margin-right: 2px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--azul); color: white; padding: 10px; text-align: left; font-size: 0.8em; }
        td { border-bottom: 1px solid #eee; padding: 8px; font-size: 0.85em; }
        .row-cta-cte { background-color: #fff3cd !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Carga de Solicitud</h2>
    <div class="grid">
        <div><label>Unidad</label><select id="unidad"><option>TÉCNICA</option><option>OPERACIONES</option><option>UOTA</option><option>ADMINISTRACIÓN</option></select></div>
        <div><label>N° Solicitud</label><input type="text" id="nro_sol" placeholder="Ej: 26/010"></div>
        <div><label>Fecha Nec.</label><input type="date" id="f_nec"></div>
        <div><label>Activo/Aeronave</label><input type="text" id="activo" placeholder="Matrícula o OFICINA"></div>
        <div><label>GIP / Anticipo</label><input type="text" id="gip" placeholder="Ej: 73-I o GIP-05"></div>
        <div><label>Proveedor</label><input type="text" id="prov"></div>
        <div><label>Agente</label><input type="text" id="agente"></div>
        <div><label>Cant. (Items)</label><input type="number" id="cant" value="1"></div>
        <div class="full"><label>Detalle Técnico</label><textarea id="detalle"></textarea></div>
    </div>
    <button class="btn btn-main" onclick="enviar()">REGISTRAR EN GOOGLE SHEETS</button>
</div>

<div class="card">
    <h2>📋 Trazabilidad</h2>
    <button class="btn" style="background:var(--celeste)" onclick="cargar()">ACTUALIZAR LISTA</button>
    <table id="tabla">
        <thead>
            <tr>
                <th>N° Sol.</th>
                <th>Unidad</th>
                <th>Detalle</th>
                <th>Estado Entrega</th>
                <th>Fin.</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpo"></tbody>
    </table>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbypLibPzVkbQE83s3s0nvGZ2FGHF-e-UZfego7KlrvR2s6qA-5O_BlJmX00dngq-Isu/exec"; // REEMPLAZAR CON TU URL /EXEC

    async function enviar() {
        const d = {
            unidad: document.getElementById('unidad').value,
            nro_sol: document.getElementById('nro_sol').value,
            f_sol: new Date().toLocaleDateString(),
            f_nec: document.getElementById('f_nec').value,
            activo: document.getElementById('activo').value,
            gip: document.getElementById('gip').value,
            prov: document.getElementById('prov').value,
            detalle: document.getElementById('detalle').value,
            agente: document.getElementById('agente').value,
            cant: document.getElementById('cant').value,
            entregado: "NO",
            finalizado: "NO"
        };
        if(!d.nro_sol || !d.detalle) return alert("Faltan datos.");
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Enviado.");
        location.reload();
    }

    async function cargar() {
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();
        const cuerpo = document.getElementById('cuerpo');
        cuerpo.innerHTML = '';
        data.reverse().forEach(f => {
            const isCtaCte = f.entregado.includes("PEND OC");
            cuerpo.innerHTML += `
                <tr class="${isCtaCte ? 'row-cta-cte' : ''}">
                    <td>${f.nro_sol}</td>
                    <td>${f.unidad}</td>
                    <td>${f.detalle}</td>
                    <td>${f.entregado}</td>
                    <td><b>${f.finalizado}</b></td>
                    <td>
                        ${f.finalizado === 'NO' ? `
                            <button class="btn btn-action" style="background:var(--gris)" onclick="updateStatus('${f.nro_sol}','STOCK')">STOCK</button>
                            <button class="btn btn-action" style="background:var(--celeste)" onclick="updateStatus('${f.nro_sol}','CTA')">CTA CTE</button>
                            <button class="btn btn-action" style="background:var(--verde)" onclick="updateStatus('${f.nro_sol}','SI')">FIN</button>
                        ` : '✓'}
                    </td>
                </tr>`;
        });
    }

    async function updateStatus(nro, modo) {
        let p = { action: "update", nro_sol: nro, entregado: "SI", finalizado: "SI" };
        if(modo === 'STOCK') p.entregado = "ENTREGADO STOCK";
        if(modo === 'CTA') { p.entregado = "S.R. PEND OC"; p.finalizado = "NO"; }
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
        alert("Estado actualizado.");
        cargar();
    }
    window.onload = cargar;
</script>
</body>
</html>
