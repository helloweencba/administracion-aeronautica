<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGA - Aeronáutica Córdoba</title>
    <style>
        :root { --azul: #1a5276; --celeste: #2980b9; --naranja: #e67e22; --verde: #27ae60; --gris: #7f8c8d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--azul); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .full { grid-column: span 2; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-main { background: var(--azul); width: 100%; margin-top: 15px; font-size: 1.1em; }
        .btn-update { background: var(--verde); font-size: 0.8em; padding: 5px 10px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--azul); color: white; padding: 10px; text-align: left; font-size: 0.8em; }
        td { border-bottom: 1px solid #eee; padding: 8px; font-size: 0.85em; vertical-align: middle; }
        .row-cta-cte { background-color: #fff3cd !important; }
        .obs-input { width: 100%; border: 1px solid #ddd; padding: 5px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Carga de Solicitud</h2>
    <div class="grid">
        <div><label>Unidad</label><select id="unidad"><option>TÉCNICA</option><option>OPERACIONES</option><option>UOTA</option><option>ADMINISTRACIÓN</option></select></div>
        <div><label>N° Solicitud</label><input type="text" id="nro_sol" placeholder="Ej: 26-001"></div>
        <div><label>Fecha Solicitud</label><input type="date" id="f_sol"></div>
        <div><label>Fecha Nec.</label><input type="date" id="f_nec"></div>
        <div><label>Aeronave/Activo</label><input type="text" id="activo"></div>
        <div><label>GIP / Anticipo</label><input type="text" id="gip"></div>
        <div><label>Proveedor</label><input type="text" id="prov"></div>
        <div><label>Agente</label><input type="text" id="agente"></div>
        <div class="full"><label>Detalle Técnico (Copie y pegue aquí)</label><textarea id="detalle" style="height:80px"></textarea></div>
    </div>
    <button class="btn btn-main" id="btnEnviar" onclick="enviar()">REGISTRAR EN GOOGLE SHEETS</button>
</div>

<div class="card">
    <h2>📋 Trazabilidad</h2>
    <button class="btn" style="background:var(--celeste)" onclick="cargar()">ACTUALIZAR LISTA</button>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>N° Sol.</th>
                    <th>Detalle</th>
                    <th>Observaciones</th>
                    <th>Tipo Entrega</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxjrOGo3eyNPI-lfOh7bb344y--yr2Gol8sr4Met14nNsJZaaEsxxQnq4aI-kmsTOlp/exec"; // REEMPLAZAR CON TU URL /EXEC

    window.onload = () => { 
        document.getElementById('f_sol').valueAsDate = new Date();
        cargar(); 
    };

    async function enviar() {
        const d = {
            unidad: document.getElementById('unidad').value,
            nro_sol: document.getElementById('nro_sol').value,
            f_sol: document.getElementById('f_sol').value,
            f_nec: document.getElementById('f_nec').value,
            activo: document.getElementById('activo').value,
            gip: document.getElementById('gip').value,
            prov: document.getElementById('prov').value,
            detalle: document.getElementById('detalle').value,
            agente: document.getElementById('agente').value,
            entregado: "NO", finalizado: "NO"
        };
        if(!d.nro_sol || !d.detalle) return alert("Faltan datos.");
        
        document.getElementById('btnEnviar').innerText = "Enviando...";
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Registrado.");
        location.reload();
    }

    async function cargar() {
        const cuerpo = document.getElementById('cuerpo');
        cuerpo.innerHTML = '<tr><td colspan="6">Cargando...</td></tr>';
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();
        cuerpo.innerHTML = '';
        data.reverse().forEach(f => {
            const isFin = f.finalizado === 'SI';
            const isCta = f.entregado.includes("PEND OC");
            cuerpo.innerHTML += `
                <tr class="${isCta ? 'row-cta-cte' : ''}">
                    <td><strong>${f.nro_sol}</strong></td>
                    <td>${f.detalle}</td>
                    <td><input type="text" id="obs_${f.nro_sol}" class="obs-input" value="${f.observaciones || ''}" ${isFin ? 'disabled' : ''}></td>
                    <td>
                        <select id="sel_${f.nro_sol}" ${isFin ? 'disabled' : ''}>
                            <option value="SI" ${f.entregado==='SI'?'selected':''}>NORMAL (SI)</option>
                            <option value="STOCK" ${f.entregado.includes('STOCK')?'selected':''}>STOCK</option>
                            <option value="CTA" ${isCta?'selected':''}>S.R. PEND OC</option>
                        </select>
                    </td>
                    <td><b style="color:${isFin ? 'var(--verde)' : 'var(--naranja)'}">${f.finalizado}</b></td>
                    <td>${!isFin ? `<button class="btn btn-update" onclick="actualizar('${f.nro_sol}')">GUARDAR</button>` : '✓'}</td>
                </tr>`;
        });
    }

    async function actualizar(nro) {
        const modo = document.getElementById(`sel_${nro}`).value;
        const obs = document.getElementById(`obs_${nro}`).value;
        let p = { action: "update", nro_sol: nro, observaciones: obs, entregado: "SI", finalizado: "SI" };
        
        if(modo === 'STOCK') p.entregado = "ENTREGADO STOCK";
        if(modo === 'CTA') { p.entregado = "S.R. PEND OC"; p.finalizado = "NO"; }

        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
        alert("Actualizado.");
        cargar();
    }
</script>
</body>
</html>
