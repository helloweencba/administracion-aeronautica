<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Solicitudes Dirección de Aeronáutica Córdoba</title>
    <style>
        :root { --azul: #003366; --verde: #27ae60; --rojo: #e74c3c; --amarillo: #f1c40f; --rosa: #fce4ec; --celeste: #e3f2fd; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; font-size: 13px; }
        #login-screen { position: fixed; inset: 0; background: var(--azul); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 380px; }
        .app-header { background: var(--azul); color: white; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--amarillo); }
        .header-logo { height: 45px; filter: brightness(0) invert(1); }
        .app-container { display: none; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Estados */
        .status-pendiente { background-color: var(--rosa) !important; }
        .status-en-ejecucion { background-color: var(--celeste) !important; }
        .status-entrega-parcial { background-color: #fff59d !important; border-left: 5px solid var(--amarillo); }
        .status-entregado { background-color: #c8e6c9 !important; }
        .status-anulado { background-color: #cfd8dc !important; text-decoration: line-through; }
        .status-terminado { background-color: #a5d6a7 !important; font-weight: bold; }

        .urgente { border: 2px solid var(--rojo) !important; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { border-color: var(--rojo); } 50% { border-color: transparent; } 100% { border-color: var(--rojo); } }

        .semaforo-f { padding: 5px; border-radius: 4px; font-weight: bold; display: flex; justify-content: space-between; color: white; }
        .bg-vencido { background: var(--rojo); }
        .bg-aviso { background: var(--amarillo); color: #333; }
        .bg-ok { background: var(--verde); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; background: #eee; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }

        .group-header { background: #455a64; color: white; padding: 8px; font-weight: bold; border-radius: 6px 6px 0 0; }
        .group-box { border: 2px solid #455a64; border-radius: 6px; margin-bottom: 15px; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .filtros-box { display: flex; flex-wrap: wrap; gap: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; align-items: center;}
        .chk-label { display: flex; align-items: center; gap: 5px; cursor: pointer; background: white; padding: 5px 10px; border-radius: 5px; border: 1px solid #ddd; font-size: 11px;}
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <img src="https://raw.githubusercontent.com/helloweencba/administracion-aeronautica/main/Logo%20aeronautica.png" width="180">
        <h2>Acceso SGA</h2>
        <select id="user-select" style="width:100%; padding:10px; margin:20px 0;">
            <option value="">Seleccione Usuario...</option>
            <option value="Federico">Federico (Admin)</option>
            <option value="Lorena">Lorena</option>
            <option value="Santiago">Santiago</option>
            <option value="Andres">Andres</option>
            <option value="TECNICA">Área TÉCNICA</option>
        </select>
        <button class="btn" style="background:var(--azul); color:white; width:100%" onclick="entrar()">INGRESAR</button>
    </div>
</div>

<div class="app-container" id="main-app">
    <header class="app-header">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="https://raw.githubusercontent.com/helloweencba/administracion-aeronautica/main/Logo%20aeronautica.png" class="header-logo">
            <div><h3 style="margin:0;">SGA Aeronáutica</h3><small id="welcome-msg"></small></div>
        </div>
        <button class="btn" style="background:var(--amarillo)" onclick="cargarDatos()">🔄 Sincronizar</button>
    </header>

    <div class="card" id="form-carga" style="display:none; background:#eef2f3;">
        <h3>➕ Nueva Solicitud</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
            <div>
                Unidad: <select id="c_unidad" style="width:100%"><option>ADMINISTRACION</option><option>OPERACIONES</option><option>TECNICA</option><option>UOTA</option></select><br><br>
                N° Solicitud: <input type="text" id="c_nro" style="width:100%"><br><br>
                F. Sol: <input type="date" id="c_f_sol" style="width:100%"><br><br>
                F. Nec: <input type="date" id="c_f_nec" style="width:100%">
            </div>
            <div>
                Activo:<br>
                <div id="check-mats" style="height:150px; overflow-y:auto; background:white; border:1px solid #ccc; padding:5px;"></div>
            </div>
            <div>
                Detalle: <textarea id="c_det" style="width:100%; height:40px;"></textarea><br>
                Motivo: <textarea id="c_mot" style="width:100%; height:40px;"></textarea><br><br>
                <button class="btn" style="background:var(--azul); color:white; width:100%" onclick="enviarNueva()">GUARDAR</button>
            </div>
        </div>
    </div>

    <div class="card" id="seccion-flota">
        <h3>🚢 Estado de Flota</h3>
        <table><thead><tr><th>Unidad</th><th>ITV</th><th>POV</th><th>Cisterna</th></tr></thead><tbody id="cuerpoFlota"></tbody></table>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3>📋 Trazabilidad</h3>
            <button class="btn" style="background:var(--verde); color:white" id="btn-nueva-sol" onclick="toggleCarga()">+ NUEVA SOLICITUD</button>
        </div>
        
        <div class="filtros-box">
            <div id="f-admin-only">Unidad: <select id="f_unidad" onchange="filtrar()"><option value="">TODAS</option><option>ADMINISTRACION</option><option>OPERACIONES</option><option>TECNICA</option><option>UOTA</option></select></div>
            
            <div style="display:flex; gap:5px; align-items:center; flex-wrap:wrap;">
                <b>Estados:</b>
                <label class="chk-label"><input type="checkbox" class="f-estado" value="PENDIENTE" checked onchange="filtrar()"> Pendiente</label>
                <label class="chk-label"><input type="checkbox" class="f-estado" value="EN EJECUCION" checked onchange="filtrar()"> Ejecución</label>
                <label class="chk-label"><input type="checkbox" class="f-estado" value="ENTREGA PARCIAL" checked onchange="filtrar()"> E. Parcial</label>
                <label class="chk-label"><input type="checkbox" class="f-estado" value="ENTREGADO" checked onchange="filtrar()"> Entregado</label>
                <label class="chk-label"><input type="checkbox" class="f-estado" value="ANULADO" onchange="filtrar()"> Anulado</label>
                <label class="chk-label"><input type="checkbox" class="f-estado" value="TERMINADO" onchange="filtrar()"> Terminado</label>
            </div>

            <input type="text" id="f_texto" placeholder="Buscar..." onkeyup="filtrar()" style="flex-grow:1; padding:8px; border-radius:6px; border:1px solid #ddd;">
            <button class="btn" style="background:#455a64; color:white" onclick="crearGrupo()">📦 AGRUPAR</button>
        </div>

        <div id="contenedor-trazabilidad"></div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwZYBhN9hKVz4e2GE2tRDTyxiRA53hA6JHtkiInORCmFZ8JwBB9nWfUIAO9YGL4Fh1A/exec"; // REEMPLAZAR CON TU URL REAL
    let USUARIO_ACTUAL = "";
    const MATS = ["LV-IHM", "LV-HWY", "LV-KOW", "LV-CDE", "LV-BIU", "LV-BFC", "LQ-KOP", "LQ-COQ", "LQ-COP", "LQ-KDO", "LQ-CCZ", "LQ-BAN", "LQ-HBQ", "AE875UX", "FAK619", "AD150QB", "IXH694"];

    function entrar() {
        USUARIO_ACTUAL = document.getElementById('user-select').value;
        if (!USUARIO_ACTUAL) return;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Operador: " + USUARIO_ACTUAL;
        if(USUARIO_ACTUAL === 'TECNICA') {
            document.getElementById('seccion-flota').style.display = 'none';
            document.getElementById('f-admin-only').style.display = 'none';
            document.getElementById('btn-nueva-sol').style.display = 'none';
        }
        cargarCheckboxes(); cargarDatos();
    }

    function cargarCheckboxes() {
        document.getElementById('check-mats').innerHTML = MATS.map(m => `<label style="display:block"><input type="checkbox" value="${m}"> ${m}</label>`).join('');
    }

    function formatFecha(f) {
    if (!f || f === "-" || f === "undefined") return "-";
    
    // Si la fecha viene como objeto Date o string largo con hora (ISO), 
    // la convertimos a string y le quitamos todo lo que sobra después de la "T"
    let fechaLimpia = typeof f === 'string' ? f.split('T')[0] : f.toString().split('T')[0];

    if (fechaLimpia.includes('-')) {
        const p = fechaLimpia.split('-');
        // Si el primer bloque tiene 4 dígitos (YYYY-MM-DD), lo damos vuelta a DD-MM-YYYY
        if (p[0].length === 4) {
            return `${p[2]}-${p[1]}-${p[0]}`;
        }
    }
    return fechaLimpia;
}

    function getSemaforo(fStr) {
        const f = formatFecha(fStr); if (f === "-") return { c: 'bg-ok', t: '-' };
        const p = f.split('-'); const venc = new Date(p[2], p[1]-1, p[0]);
        const diff = Math.ceil((venc - new Date())/(1000*60*60*24));
        if (diff < 0) return { c: 'bg-vencido', t: f };
        if (diff <= 45) return { c: 'bg-aviso', t: f };
        return { c: 'bg-ok', t: f };
    }

    function cargarDatos() {
        const s = document.createElement('script');
        s.src = `${WEB_APP_URL}?action=read&callback=renderTotal`;
        document.body.appendChild(s);
    }

    window.renderTotal = function(data) {
        if(data.error) return alert("Error: " + data.error);
        
        // Flota
        const cF = document.getElementById('cuerpoFlota'); 
        cF.innerHTML = '';
        data.flota.forEach(f => {
            cF.innerHTML += `<tr><td><strong>${f.patente}</strong></td>
                <td>${celdaF(f.patente, 'itv', f.itv)}</td><td>${celdaF(f.patente, 'pov', f.pov)}</td><td>${celdaF(f.patente, 'cisterna', f.cisterna)}</td></tr>`;
        });

        // Trazabilidad
        const cont = document.getElementById('contenedor-trazabilidad'); 
        cont.innerHTML = '';
        const grupos = {};
        
        data.solicitudes.forEach(s => {
            if (USUARIO_ACTUAL === 'TECNICA' && s.unidad !== 'TECNICA') return;
            const key = s.id_g || ('S_' + s.unidad + '_' + s.nro_sol);
            if (!grupos[key]) grupos[key] = { nom: s.nom_g, id: s.id_g, sols: [] };
            grupos[key].sols.push(s);
        });

        for (let k in grupos) {
            const g = grupos[k];
            const htmlG = g.nom ? `<div class="group-header">📦 GRUPO: ${g.nom}</div>` : '';
            let filas = g.sols.map(s => {
                const sem = getSemaforo(s.f_nec);
                const urg = (s.estado !== 'TERMINADO' && s.estado !== 'ENTREGADO' && s.estado !== 'ANULADO') && sem.c !== 'bg-ok';
                const isT = USUARIO_ACTUAL === 'TECNICA';
                const uKey = `${s.unidad}|${s.nro_sol}`; // DOBLE LLAVE ÚNICA

              return `<tr class="fila-data status-${s.estado.toLowerCase().replace(/ /g,'-')} ${urg?'urgente':''}" data-unidad="${s.unidad}" data-estado="${s.estado}" data-txt="${s.nro_sol} ${s.detalle} ${s.activo} ${s.nom_g}">
                    <td><input type="checkbox" class="check-agrupar" value="${uKey}"></td>
                    <td><small style="color:var(--azul); font-weight:bold;">${s.unidad}</small><br><b style="font-size:14px;">${s.nro_sol}</b></td>
                    <td><b>${s.activo}</b><br><small>${s.detalle}</small></td>
                    <td>F.Nec: ${formatFecha(s.f_nec)}</td>
                    <td>` +
                        <input type="text" id="gip_${uKey}" value="${s.gip}" placeholder="GIP" style="width:50px" ${isT?'disabled':''}>
                        <input type="text" id="oc_${uKey}" value="${s.oc}" placeholder="OC" style="width:50px" ${isT?'disabled':''}>
                        <input type="text" id="fac_${uKey}" value="${s.factura}" placeholder="Fact" style="width:50px" ${isT?'disabled':''}>
                    </td>
                    <td><textarea id="obs_${uKey}" style="width:100px; height:40px;">${s.obs}</textarea></td>
                    <td>
                        <select id="est_${uKey}">
                            <option value="PENDIENTE" ${s.estado==='PENDIENTE'?'selected':''}>PENDIENTE</option>
                            <option value="EN EJECUCION" ${s.estado==='EN EJECUCION'?'selected':''}>EN EJECUCION</option>
                            <option value="ENTREGA PARCIAL" ${s.estado==='ENTREGA PARCIAL'?'selected':''}>E. PARCIAL</option>
                            <option value="ENTREGADO" ${s.estado==='ENTREGADO'?'selected':''}>ENTREGADO</option>
                            <option value="ANULADO" ${s.estado==='ANULADO'?'selected':''}>ANULADO</option>
                            ${!isT ? `<option value="TERMINADO" ${s.estado==='TERMINADO'?'selected':''}>TERMINADO</option>` : ''}
                        </select>
                    </td>
                    <td>
                        <button class="btn" style="background:var(--verde); color:white" onclick="saveSol('${s.nro_sol}','${s.id_g}','${s.unidad}')">💾</button>
                        ${s.id_g ? `<button class="btn" style="background:#607d8b; color:white; margin-top:3px" onclick="desagrupar('${s.nro_sol}','${s.unidad}')">🗑️</button>` : ''}
                    </td>
                </tr>`;
            }).join('');
            cont.innerHTML += `<div class="group-box">${htmlG}<table>${filas}</table></div>`;
        }
        filtrar();
    }

    function celdaF(pat, campo, valor) {
        const sem = getSemaforo(valor);
        return `<div class="semaforo-f ${sem.c}" id="box_${pat}_${campo}"><span>${sem.t}</span><span style="cursor:pointer" onclick="editF('${pat}','${campo}','${valor}')">✏️</span></div>`;
    }

    function editF(pat, campo, val) {
        document.getElementById(`box_${pat}_${campo}`).innerHTML = `<input type="text" id="i_${pat}_${campo}" value="${val}" style="width:75px"> <button onclick="saveF('${pat}','${campo}')">OK</button>`;
    }

    function saveF(pat, campo) {
        ejecutar('updateFlota', { patente: pat, campo: campo, valor: document.getElementById(`i_${pat}_${campo}`).value, user: USUARIO_ACTUAL });
    }

    function saveSol(n, idG, u) {
        const key = `${u}|${n}`;
        ejecutar('update', { 
            nro_sol: n, id_g: idG, unidad: u, 
            gip: document.getElementById(`gip_${key}`).value, 
            oc: document.getElementById(`oc_${key}`).value,
            factura: document.getElementById(`fac_${key}`).value, 
            obs: document.getElementById(`obs_${key}`).value, 
            estado: document.getElementById(`est_${key}`).value, 
            user: USUARIO_ACTUAL 
        });
    }

    function desagrupar(n, u) { if(confirm("¿Quitar del grupo?")) ejecutar('desagrupar', { nro_sol: n, unidad: u, user: USUARIO_ACTUAL }); }
    
    function toggleCarga() { 
        const f = document.getElementById('form-carga'); 
        f.style.display = f.style.display === 'none' ? 'block' : 'none'; 
    }

    function enviarNueva() {
        const fSol = document.getElementById('c_f_sol').value;
        const fNec = document.getElementById('c_f_nec').value;
        const mats = Array.from(document.querySelectorAll('#check-mats input:checked')).map(c => c.value).join(', ');
        if(!document.getElementById('c_nro').value || !fSol || !fNec) return alert("Complete Nro y Fechas");
        ejecutar('create', { nro_sol: document.getElementById('c_nro').value, unidad: document.getElementById('c_unidad').value, activo: mats, f_sol: fSol, f_nec: fNec, detalle: document.getElementById('c_det').value, motivo: document.getElementById('c_mot').value, user: USUARIO_ACTUAL });
        toggleCarga();
    }

    function crearGrupo() {
        const checks = Array.from(document.querySelectorAll('.check-agrupar:checked')).map(c => c.value);
        if (checks.length < 2) return alert("Seleccione al menos 2");
        const nom = prompt("Nombre del Grupo:");
        if (nom) ejecutar('agrupar', { ids: checks.join(','), nombre_grupo: nom, user: USUARIO_ACTUAL });
    }

    function ejecutar(act, par) {
        let url = `${WEB_APP_URL}?action=${act}&callback=renderTotal`;
        for (let k in par) url += `&${k}=${encodeURIComponent(par[k])}`;
        const s = document.createElement('script'); s.src = url; document.body.appendChild(s);
    }

    function filtrar() {
        const u = document.getElementById('f_unidad').value;
        const t = document.getElementById('f_texto').value.toLowerCase();
        const estadosPermitidos = Array.from(document.querySelectorAll('.f-estado:checked')).map(c => c.value);
        
        document.querySelectorAll('.fila-data').forEach(f => {
            const matchU = !u || f.dataset.unidad === u;
            const matchE = estadosPermitidos.includes(f.dataset.estado);
            const matchT = !t || f.dataset.txt.toLowerCase().includes(t);
            f.style.display = (matchU && matchE && matchT) ? '' : 'none';
        });
        
        document.querySelectorAll('.group-box').forEach(gb => {
            const tieneFilasVisibles = Array.from(gb.querySelectorAll('.fila-data')).some(r => r.style.display !== 'none');
            gb.style.display = tieneFilasVisibles ? '' : 'none';
        });
    }
</script>
</body>
</html>
