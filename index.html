<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Solicitudes – Dirección de Aeronáutica Córdoba</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --azul:      #001f4d;
  --azul-mid:  #0a3270;
  --azul-brd:  #1e4d8c;
  --azul-txt:  #7a9cc4;
  --dorado:    #c9a84c;
  --dorado-d:  #a07830;
  --blanco:    #ffffff;
  --gris-bg:   #f0f3f8;
  --gris-brd:  #d0d8e8;
  --rojo:      #c0392b;
  --rojo-bg:   #fdf0ef;
  --amarillo-bg:#fef9ec;
  --verde:     #1a7a3a;
  --verde-bg:  #edf7f1;
  --gris-txt:  #5a6a80;
  --font:      'Barlow', sans-serif;
  --font-cond: 'Barlow Condensed', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--gris-bg); color: var(--azul); font-size: 13px; }

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0;
  background: var(--azul);
  background-image: radial-gradient(ellipse at 60% 40%, #0a3270 0%, #001f4d 70%);
  display: flex; justify-content: center; align-items: center; z-index: 2000;
}
.login-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 18px; padding: 48px 44px 40px;
  text-align: center; width: 400px;
  backdrop-filter: blur(10px);
}
.login-logo-wrap {
  display: flex; justify-content: center; align-items: center;
  margin-bottom: 20px;
}
.login-logo {
  width: 170px; height: auto;
  filter: brightness(0) invert(1);
}
.login-logo-fallback {
  width: 90px; height: 90px; border-radius: 50%;
  background: var(--azul-mid);
  border: 3px solid var(--dorado);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-cond); font-size: 11px; font-weight: 700;
  color: var(--dorado); letter-spacing: 0.05em; text-align: center;
  line-height: 1.3;
}
.login-title {
  font-family: var(--font-cond); font-size: 22px; font-weight: 700;
  color: var(--blanco); letter-spacing: 0.04em; line-height: 1.2; margin-bottom: 4px;
}
.login-sub { font-size: 11px; color: var(--azul-txt); letter-spacing: 0.07em; margin-bottom: 10px; }
.login-divider { width: 40px; height: 2px; background: var(--dorado); margin: 0 auto 24px; border-radius: 2px; }
.login-card select {
  width: 100%; padding: 11px 14px;
  background: var(--azul-mid); border: 1px solid var(--azul-brd);
  border-radius: 8px; color: var(--blanco);
  font-family: var(--font); font-size: 13px; margin-bottom: 14px;
  appearance: none; cursor: pointer;
}
.login-card select option { background: var(--azul-mid); }
.btn-login {
  width: 100%; padding: 13px;
  background: var(--dorado); color: var(--azul);
  border: none; border-radius: 8px;
  font-family: var(--font-cond); font-size: 15px; font-weight: 700;
  letter-spacing: 0.07em; cursor: pointer; transition: background 0.2s;
}
.btn-login:hover { background: var(--dorado-d); color: var(--blanco); }

/* ── HEADER ── */
.app-header {
  background: var(--azul); padding: 10px 24px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 3px solid var(--dorado);
  position: sticky; top: 0; z-index: 100;
}
.header-logo { height: 36px; filter: brightness(0) invert(1); }
.header-logo-fallback {
  height: 36px; width: 36px; border-radius: 50%;
  background: var(--azul-mid); border: 2px solid var(--dorado);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--dorado); font-family: var(--font-cond);
  letter-spacing: 0.03em; text-align: center; line-height: 1.2;
}
.header-info h3 { color: var(--blanco); font-family: var(--font-cond); font-size: 15px; font-weight: 700; letter-spacing: 0.03em; }
.header-info small { color: var(--azul-txt); font-size: 11px; }
.btn-sync {
  background: transparent; border: 1px solid var(--dorado); color: var(--dorado);
  border-radius: 7px; padding: 7px 16px; font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s, color 0.2s;
}
.btn-sync:hover { background: var(--dorado); color: var(--azul); }

/* ── LAYOUT ── */
#main-app { display: none; }
.app-body { padding: 20px 24px; max-width: 1500px; margin: 0 auto; }

/* ── CARD ── */
.card {
  background: var(--blanco); border: 0.5px solid var(--gris-brd);
  border-radius: 12px; padding: 20px; margin-bottom: 20px;
  box-shadow: 0 2px 10px rgba(0,31,77,0.05);
}
.card-title {
  font-family: var(--font-cond); font-size: 15px; font-weight: 700;
  color: var(--azul); letter-spacing: 0.03em;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--gris-brd); padding-bottom: 12px; margin-bottom: 16px;
}
.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

/* ── FORMULARIO ── */
#form-carga { display: none; border: 1px solid var(--dorado); background: #fdfaf3; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--gris-txt); letter-spacing: 0.05em; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--gris-brd); border-radius: 7px;
  font-family: var(--font); font-size: 13px; color: var(--azul); background: var(--blanco);
}
.form-group textarea { resize: vertical; }
#check-mats {
  height: 140px; overflow-y: auto;
  background: var(--blanco); border: 1px solid var(--gris-brd);
  border-radius: 7px; padding: 8px;
}
#check-mats label { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; cursor: pointer; }

/* ── FLOTA ── */
.flota-table { width: 100%; border-collapse: collapse; }
.flota-table th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--azul-txt); letter-spacing: 0.05em; border-bottom: 1px solid var(--gris-brd); }
.flota-table td { padding: 8px 12px; border-bottom: 0.5px solid var(--gris-brd); }
.flota-table tr:last-child td { border-bottom: none; }
.flota-table td:first-child { font-weight: 600; color: var(--azul); }
.semaforo-pill {
  display: inline-flex; align-items: center; justify-content: space-between;
  gap: 8px; padding: 4px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 500; min-width: 120px;
}
.sem-ok      { background: var(--verde-bg); color: var(--verde); border: 1px solid #a3d9b1; }
.sem-aviso   { background: var(--amarillo-bg); color: #7a5a00; border: 1px solid #f0d580; }
.sem-vencido { background: var(--rojo-bg); color: var(--rojo); border: 1px solid #f5b8b3; }

/* ── FILTROS ── */
.filtros-box {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  background: var(--gris-bg); border-radius: 8px;
  padding: 12px 16px; margin-bottom: 16px; border: 0.5px solid var(--gris-brd);
}
.filtros-box select, .filtros-box input[type="text"] {
  padding: 7px 10px; border-radius: 7px;
  border: 1px solid var(--gris-brd); font-family: var(--font); font-size: 12px;
  color: var(--azul); background: var(--blanco);
}
.filtros-box input[type="text"] { flex-grow: 1; min-width: 180px; }
.chk-label {
  display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500;
  cursor: pointer; background: var(--blanco); padding: 5px 10px;
  border-radius: 6px; border: 1px solid var(--gris-brd); color: var(--azul);
}

/* ── GRUPOS ── */
.group-box { border: 0.5px solid var(--gris-brd); border-radius: 10px; margin-bottom: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,31,77,0.04); }
.group-header { background: var(--azul); padding: 9px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.group-header-name { color: var(--blanco); font-family: var(--font-cond); font-size: 14px; font-weight: 700; letter-spacing: 0.03em; }
.group-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.gpill { font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 10px; letter-spacing: 0.03em; }
.gpill-PENDIENTE        { background: #fce4ec; color: #8b1a1a; }
.gpill-EN-EJECUCION     { background: #e3f2fd; color: #0d47a1; }
.gpill-ENTREGA-PARCIAL  { background: #fff9e6; color: #7a5a00; }
.gpill-ENTREGADO        { background: #e8f5e9; color: #1b5e20; }
.gpill-ANULADO          { background: #eceff1; color: #455a64; }
.gpill-TERMINADO        { background: #c8e6c9; color: #1b5e20; font-style: italic; }

/* ── TABLA SOLICITUDES ── */
.sol-table { width: 100%; border-collapse: collapse; }
.sol-table td { padding: 9px 10px; border-bottom: 0.5px solid var(--gris-brd); vertical-align: middle; }
.sol-table tr:last-child td { border-bottom: none; }
.unidad-tag { font-size: 10px; font-weight: 600; color: var(--azul-txt); letter-spacing: 0.06em; }
.nro-sol { font-family: var(--font-cond); font-size: 17px; font-weight: 700; color: var(--azul); }
.activo-txt { font-weight: 600; color: var(--azul); }
.detalle-txt { font-size: 11px; color: var(--gris-txt); }
.fecha-ok      { color: var(--verde); font-weight: 500; font-size: 12px; }
.fecha-aviso   { color: #9a6f00; font-weight: 600; font-size: 12px; }
.fecha-vencida { color: var(--rojo); font-weight: 700; font-size: 12px; }

.campo-mini { width: 60px; padding: 5px 6px; border: 1px solid var(--gris-brd); border-radius: 5px; font-family: var(--font); font-size: 12px; color: var(--azul); text-align: center; }
.campo-mini:focus { outline: none; border-color: var(--dorado); }
.obs-input { width: 120px; height: 40px; padding: 5px 7px; border: 1px solid var(--gris-brd); border-radius: 5px; font-family: var(--font); font-size: 12px; resize: none; }
.obs-input:focus { outline: none; border-color: var(--dorado); }
.estado-select { padding: 6px 7px; border: 1px solid var(--gris-brd); border-radius: 5px; font-family: var(--font); font-size: 12px; color: var(--azul); background: var(--blanco); }

/* estados de fila */
.status-PENDIENTE        { background: #fff5f5 !important; }
.status-EN-EJECUCION     { background: #f0f7ff !important; }
.status-ENTREGA-PARCIAL  { background: #fffbee !important; }
.status-ENTREGADO        { background: #f0faf4 !important; }
.status-ANULADO          { background: #f5f5f5 !important; opacity: 0.75; }
.status-TERMINADO        { background: #e8f5e9 !important; }
.urgente td:first-child  { box-shadow: inset 4px 0 0 var(--rojo); animation: blink-brd 1.8s infinite; }
@keyframes blink-brd { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

/* ── BOTONES ── */
.btn { border: none; border-radius: 6px; cursor: pointer; font-family: var(--font); font-weight: 600; transition: opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn-gold    { background: var(--dorado); color: var(--azul); padding: 7px 12px; font-size: 12px; }
.btn-gold:hover { background: var(--dorado-d); color: var(--blanco); }
.btn-outline { background: transparent; border: 1px solid var(--gris-brd); color: var(--azul); padding: 7px 12px; font-size: 12px; }
.btn-outline:hover { background: var(--gris-bg); }
.btn-danger  { background: #fce4ec; color: var(--rojo); border: 1px solid #f5b8b3; padding: 5px 9px; font-size: 11px; }
.btn-primary { background: var(--azul); color: var(--blanco); padding: 9px 18px; font-size: 12px; letter-spacing: 0.04em; }
.btn-primary:hover { background: var(--azul-mid); }
.btn-green   { background: var(--verde-bg); color: var(--verde); border: 1px solid #a3d9b1; padding: 7px 14px; font-size: 12px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 28px; right: 28px; z-index: 9999;
  background: var(--azul); border-left: 4px solid var(--dorado);
  border-radius: 10px; padding: 14px 20px;
  display: flex; align-items: flex-start; gap: 12px;
  min-width: 280px; max-width: 360px;
  box-shadow: 0 8px 24px rgba(0,31,77,0.25);
  transform: translateY(80px); opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
  pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast-icon  { font-size: 18px; margin-top: 1px; flex-shrink: 0; }
#toast-title { color: var(--blanco); font-weight: 600; font-size: 13px; }
#toast-sub   { color: var(--azul-txt); font-size: 11px; margin-top: 2px; }

/* ── LOADING ── */
#loading-overlay {
  position: fixed; inset: 0; background: rgba(0,31,77,0.15);
  z-index: 1500; display: none; justify-content: center; align-items: center;
}
#loading-overlay.show { display: flex; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(201,168,76,0.3); border-top-color: var(--dorado); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.meta-txt { font-size: 10px; color: var(--gris-txt); margin-top: 2px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img
        src="https://raw.githubusercontent.com/helloweencba/administracion-aeronautica/main/Logo_20aeronautica.png"
        class="login-logo"
        alt="Aeronáutica Córdoba"
        onerror="this.style.display='none'; document.getElementById('logo-fallback-login').style.display='flex';"
      >
      <div class="login-logo-fallback" id="logo-fallback-login" style="display:none;">AERONÁUTICA<br>CÓRDOBA</div>
    </div>
    <div class="login-title">Gestor de Solicitudes</div>
    <div class="login-sub">DIRECCIÓN DE AERONÁUTICA CÓRDOBA</div>
    <div class="login-divider"></div>
    <select id="user-select">
      <option value="">Seleccione usuario...</option>
      <option value="Federico">Federico (Admin)</option>
      <option value="Lorena">Lorena</option>
      <option value="Santiago">Santiago</option>
      <option value="Andres">Andrés</option>
      <option value="TECNICA">Área TÉCNICA</option>
    </select>
    <button class="btn-login" onclick="entrar()">INGRESAR</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading-overlay"><div class="spinner"></div></div>

<!-- TOAST -->
<div id="toast">
  <div id="toast-icon">✅</div>
  <div>
    <div id="toast-title">Cambios guardados</div>
    <div id="toast-sub"></div>
  </div>
</div>

<!-- APP -->
<div id="main-app">
  <header class="app-header">
    <div style="display:flex;align-items:center;gap:14px;">
      <img
        src="https://raw.githubusercontent.com/helloweencba/administracion-aeronautica/main/Logo_20aeronautica.png"
        class="header-logo"
        alt="Aeronáutica Córdoba"
        onerror="this.style.display='none'; document.getElementById('logo-fallback-header').style.display='flex';"
      >
      <div class="header-logo-fallback" id="logo-fallback-header" style="display:none;">AC</div>
      <div class="header-info">
        <h3>Gestor de Solicitudes – Dirección de Aeronáutica Córdoba</h3>
        <small id="welcome-msg"></small>
      </div>
    </div>
    <button class="btn-sync" onclick="cargarDatos()">↺ Sincronizar</button>
  </header>

  <div class="app-body">

    <!-- NUEVA SOLICITUD -->
    <div class="card" id="form-carga">
      <div class="card-title">➕ Nueva Solicitud</div>
      <div class="form-grid">
        <div>
          <div class="form-group">
            <label>UNIDAD REQUIRENTE</label>
            <select id="c_unidad">
              <option>ADMINISTRACION</option>
              <option>OPERACIONES</option>
              <option>TECNICA</option>
              <option>UOTA</option>
            </select>
          </div>
          <div class="form-group">
            <label>N° SOLICITUD</label>
            <input type="text" id="c_nro" placeholder="Ej: 26-009">
          </div>
          <div class="form-group">
            <label>FECHA SOLICITUD</label>
            <input type="date" id="c_f_sol">
          </div>
          <div class="form-group">
            <label>FECHA NECESIDAD</label>
            <input type="date" id="c_f_nec">
          </div>
        </div>
        <div>
          <div class="form-group">
            <label>AERONAVE / VEHÍCULO</label>
            <div id="check-mats"></div>
          </div>
        </div>
        <div>
          <div class="form-group">
            <label>DETALLE</label>
            <textarea id="c_det" style="height:65px;"></textarea>
          </div>
          <div class="form-group">
            <label>MOTIVO</label>
            <textarea id="c_mot" style="height:65px;"></textarea>
          </div>
          <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="enviarNueva()">GUARDAR SOLICITUD</button>
        </div>
      </div>
    </div>

    <!-- FLOTA -->
    <div class="card" id="seccion-flota">
      <div class="card-title">🚁 Estado de Flota</div>
      <table class="flota-table">
        <thead>
          <tr>
            <th>PATENTE / UNIDAD</th>
            <th>ITV</th>
            <th>POV</th>
            <th>CISTERNA</th>
          </tr>
        </thead>
        <tbody id="cuerpoFlota"></tbody>
      </table>
    </div>

    <!-- TRAZABILIDAD -->
    <div class="card">
      <div class="top-row">
        <div class="card-title" style="border:none;padding:0;margin:0;">📋 Trazabilidad de Solicitudes</div>
        <button class="btn btn-green" id="btn-nueva-sol" onclick="toggleCarga()">+ Nueva Solicitud</button>
      </div>

      <div class="filtros-box">
        <div id="f-admin-only">
          <select id="f_unidad" onchange="filtrar()">
            <option value="">Todas las unidades</option>
            <option>ADMINISTRACION</option>
            <option>OPERACIONES</option>
            <option>TECNICA</option>
            <option>UOTA</option>
          </select>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          <span style="font-size:11px;font-weight:600;color:var(--gris-txt);">ESTADOS:</span>
          <label class="chk-label"><input type="checkbox" class="f-estado" value="PENDIENTE" checked onchange="filtrar()"> Pendiente</label>
          <label class="chk-label"><input type="checkbox" class="f-estado" value="EN EJECUCION" checked onchange="filtrar()"> Ejecución</label>
          <label class="chk-label"><input type="checkbox" class="f-estado" value="ENTREGA PARCIAL" checked onchange="filtrar()"> E. Parcial</label>
          <label class="chk-label"><input type="checkbox" class="f-estado" value="ENTREGADO" checked onchange="filtrar()"> Entregado</label>
          <label class="chk-label"><input type="checkbox" class="f-estado" value="ANULADO" onchange="filtrar()"> Anulado</label>
          <label class="chk-label"><input type="checkbox" class="f-estado" value="TERMINADO" onchange="filtrar()"> Terminado</label>
        </div>
        <input type="text" id="f_texto" placeholder="Buscar por N°, detalle, aeronave..." onkeyup="filtrar()">
        <button class="btn btn-outline" onclick="crearGrupo()">📦 Agrupar seleccionadas</button>
      </div>

      <div id="contenedor-trazabilidad"></div>
    </div>

  </div><!-- /app-body -->
</div><!-- /main-app -->

<script>
// ── CONFIG ──
var WEB_APP_URL  = "https://script.google.com/macros/s/AKfycbyl7lGIq1m6zgPcOEQ55nSJxGQQ3Gj82h3ORsr27DLR6_7-mC6kToCN4DsjipdxUHed/exec";
var USUARIO_ACTUAL = "";
var MATS_DINAMICOS = [];
var _toastTimer    = null;
var _pendingScript = null;

// Fallback MATS hardcodeado — se pisa con lo que venga del Sheet de Flota
var MATS_FALLBACK = [
  "LV-IHM","LV-HWY","LV-KOW","LV-CDE","LV-BIU","LV-BFC",
  "LQ-KOP","LQ-COQ","LQ-COP","LQ-KDO","LQ-CCZ","LQ-BAN","LQ-HBQ",
  "AE875UX","FAK619","AD150QB","IXH694"
];

// ── LOGIN ──
function entrar() {
  var u = document.getElementById('user-select').value;
  if (!u) { mostrarToast('⚠️','Seleccione usuario','Debe elegir un usuario para ingresar.'); return; }
  USUARIO_ACTUAL = u;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('welcome-msg').innerText = 'Operador: ' + u;

  if (u === 'TECNICA') {
    document.getElementById('seccion-flota').style.display = 'none';
    document.getElementById('f-admin-only').style.display  = 'none';
    document.getElementById('btn-nueva-sol').style.display = 'none';
  }
  cargarCheckboxes(MATS_FALLBACK);
  cargarDatos();
}

// ── CARGA DATOS ──
function cargarDatos() {
  setLoading(true);
  limpiarScriptPendiente();
  var s = document.createElement('script');
  s.src = WEB_APP_URL + '?action=read&callback=renderTotal&_t=' + Date.now();
  s.onerror = function() { setLoading(false); mostrarToast('❌','Error de conexión','No se pudo conectar con el servidor.'); };
  document.body.appendChild(s);
  _pendingScript = s;
}

function limpiarScriptPendiente() {
  if (_pendingScript && _pendingScript.parentNode) {
    _pendingScript.parentNode.removeChild(_pendingScript);
    _pendingScript = null;
  }
}

// ── RENDER PRINCIPAL ──
window.renderTotal = function(data) {
  setLoading(false);
  if (data.error) { mostrarToast('❌','Error','Error: ' + data.error); return; }

  // Actualizar MATS desde Flota
  if (data.flota && data.flota.length > 0) {
    var primerCampo = Object.keys(data.flota[0])[0];
    MATS_DINAMICOS = data.flota.map(function(f){ return f[primerCampo]; }).filter(Boolean);
    cargarCheckboxes(MATS_DINAMICOS);
  }

  // ── FLOTA ──
  var cF = document.getElementById('cuerpoFlota');
  cF.innerHTML = '';
  data.flota.forEach(function(f) {
    var primerCampo = Object.keys(f)[0];
    var patente = f[primerCampo];
    // Detectar columnas de fecha (2°, 3°, 4° campo)
    var campos  = Object.keys(f).slice(1);
    var celdas  = campos.map(function(c) { return celdaF(patente, c, f[c]); }).join('');
    cF.innerHTML += '<tr><td><strong>' + patente + '</strong></td>' + celdas + '</tr>';
  });

  // ── TRAZABILIDAD ──
  var cont = document.getElementById('contenedor-trazabilidad');
  cont.innerHTML = '';
  var grupos = {};

  data.solicitudes.forEach(function(s) {
    if (USUARIO_ACTUAL === 'TECNICA' && s.unidad !== 'TECNICA') return;
    var key = s.id_g ? s.id_g : ('_SOL_' + s.unidad + '_' + s.nro_sol);
    if (!grupos[key]) grupos[key] = { nom: s.nom_g, id: s.id_g, sols: [] };
    grupos[key].sols.push(s);
  });

  var estadoSlug = {
    'PENDIENTE':       'PENDIENTE',
    'EN EJECUCION':    'EN-EJECUCION',
    'ENTREGA PARCIAL': 'ENTREGA-PARCIAL',
    'ENTREGADO':       'ENTREGADO',
    'ANULADO':         'ANULADO',
    'TERMINADO':       'TERMINADO'
  };
  var labelCorto = {
    'PENDIENTE':'Pendiente','EN EJECUCION':'Ejecución',
    'ENTREGA PARCIAL':'E. Parcial','ENTREGADO':'Entregado',
    'ANULADO':'Anulado','TERMINADO':'Terminado'
  };

  for (var k in grupos) {
    var g = grupos[k];

    // Pills de resumen
    var conteo = {};
    g.sols.forEach(function(s){ conteo[s.estado] = (conteo[s.estado]||0)+1; });
    var pillsHtml = '';
    for (var est in conteo) {
      var slug = estadoSlug[est] || est.replace(/ /g,'-');
      pillsHtml += '<span class="gpill gpill-' + slug + '">' + conteo[est] + ' ' + (labelCorto[est]||est) + '</span>';
    }

    var headerHtml = g.nom
      ? '<div class="group-header"><span class="group-header-name">📦 ' + g.nom + '</span><div class="group-pills">' + pillsHtml + '</div></div>'
      : '';

    var filasHtml = g.sols.map(function(s) {
      var sem     = getSemaforo(s.f_nec);
      var urg     = ['PENDIENTE','EN EJECUCION','ENTREGA PARCIAL'].indexOf(s.estado) > -1 && sem !== 'fecha-ok';
      var isT     = USUARIO_ACTUAL === 'TECNICA';
      var uKey    = s.unidad + '|' + s.nro_sol;
      var clsFila = 'status-' + (estadoSlug[s.estado] || s.estado.replace(/ /g,'-'));

      var fechaHtml = s.f_nec
        ? '<span class="' + sem + '">' + (sem !== 'fecha-ok' ? '⚠ ' : '') + s.f_nec + '</span>'
        : '<span class="meta-txt">-</span>';

      var disabledAttr = isT ? 'disabled' : '';

      return '<tr class="fila-data ' + clsFila + (urg ? ' urgente' : '') + '"' +
             ' data-unidad="' + s.unidad + '"' +
             ' data-estado="' + s.estado + '"' +
             ' data-txt="' + (s.nro_sol + ' ' + s.detalle + ' ' + s.activo + ' ' + (s.nom_g||'')).toLowerCase() + '">' +
        '<td style="width:30px"><input type="checkbox" class="check-agrupar" value="' + uKey + '"></td>' +
        '<td style="min-width:110px">' +
          '<div class="unidad-tag">' + s.unidad + '</div>' +
          '<div class="nro-sol">' + s.nro_sol + '</div>' +
          '<div class="meta-txt">F.Sol: ' + (s.f_sol||'-') + '</div>' +
        '</td>' +
        '<td style="min-width:150px">' +
          '<div class="activo-txt">' + (s.activo||'-') + '</div>' +
          '<div class="detalle-txt">' + (s.detalle||'') + '</div>' +
        '</td>' +
        '<td style="min-width:120px">' +
          '<div class="meta-txt">Fecha Necesidad</div>' +
          fechaHtml +
          (s.f_estado ? '<div class="meta-txt" style="margin-top:3px;">Ult.cambio: ' + s.f_estado + '</div>' : '') +
        '</td>' +
        '<td>' +
          '<div style="display:flex;gap:4px;flex-wrap:wrap;">' +
            '<input type="text" class="campo-mini" id="gip_' + uKey + '" value="' + (s.gip||'') + '" placeholder="GIP" ' + disabledAttr + '>' +
            '<input type="text" class="campo-mini" id="oc_' + uKey  + '" value="' + (s.oc ||'') + '" placeholder="OC"  ' + disabledAttr + '>' +
            '<input type="text" class="campo-mini" id="fac_' + uKey + '" value="' + (s.factura||'') + '" placeholder="Fact" ' + disabledAttr + '>' +
          '</div>' +
        '</td>' +
        '<td><textarea class="obs-input" id="obs_' + uKey + '">' + (s.obs||'') + '</textarea></td>' +
        '<td style="min-width:140px">' +
          '<select class="estado-select" id="est_' + uKey + '">' +
            '<option value="PENDIENTE"'       + (s.estado==='PENDIENTE'       ?'selected':'') + '>PENDIENTE</option>' +
            '<option value="EN EJECUCION"'    + (s.estado==='EN EJECUCION'    ?'selected':'') + '>EN EJECUCION</option>' +
            '<option value="ENTREGA PARCIAL"' + (s.estado==='ENTREGA PARCIAL' ?'selected':'') + '>E. PARCIAL</option>' +
            '<option value="ENTREGADO"'       + (s.estado==='ENTREGADO'       ?'selected':'') + '>ENTREGADO</option>' +
            '<option value="ANULADO"'         + (s.estado==='ANULADO'         ?'selected':'') + '>ANULADO</option>' +
            (!isT ? '<option value="TERMINADO"' + (s.estado==='TERMINADO'?'selected':'') + '>TERMINADO</option>' : '') +
          '</select>' +
        '</td>' +
        '<td style="min-width:100px">' +
          '<div style="display:flex;flex-direction:column;gap:5px;">' +
            '<button class="btn btn-gold" onclick="saveSol(\'' + s.nro_sol + '\',\'' + (s.id_g||'') + '\',\'' + s.unidad + '\')">💾 Guardar</button>' +
            (s.id_g ? '<button class="btn btn-danger" onclick="desagrupar(\'' + s.nro_sol + '\',\'' + s.unidad + '\')">Quitar grupo</button>' : '') +
          '</div>' +
        '</td>' +
      '</tr>';
    }).join('');

    cont.innerHTML += '<div class="group-box">' + headerHtml + '<table class="sol-table">' + filasHtml + '</table></div>';
  }

  filtrar();
};

// ── FLOTA CELDA ──
function celdaF(pat, campo, valor) {
  var cls = getSemaforoFlota(valor);
  var semCls = cls === 'fecha-ok' ? 'sem-ok' : cls === 'fecha-aviso' ? 'sem-aviso' : 'sem-vencido';
  return '<td><div class="semaforo-pill ' + semCls + '" id="box_' + pat + '_' + campo + '">' +
    '<span>' + (valor||'-') + '</span>' +
    '<span style="cursor:pointer;font-size:13px;" onclick="editF(\'' + pat + '\',\'' + campo + '\',\'' + (valor||'') + '\')">✏️</span>' +
    '</div></td>';
}
function editF(pat, campo, val) {
  document.getElementById('box_' + pat + '_' + campo).innerHTML =
    '<input type="text" id="i_' + pat + '_' + campo + '" value="' + val + '" style="width:90px;padding:4px 6px;border:1px solid var(--gris-brd);border-radius:5px;font-size:12px;" placeholder="dd-mm-yyyy">' +
    '<button class="btn btn-gold" style="padding:4px 8px;font-size:11px;margin-left:4px;" onclick="saveF(\'' + pat + '\',\'' + campo + '\')">OK</button>';
}
function saveF(pat, campo) {
  var val = document.getElementById('i_' + pat + '_' + campo).value;
  ejecutar('updateFlota', { patente: pat, campo: campo, valor: val, user: USUARIO_ACTUAL });
  mostrarToast('✅', 'Flota actualizada', pat + ' · ' + campo.toUpperCase() + ' → ' + val);
}

// ── GUARDAR SOLICITUD ──
function saveSol(n, idG, u) {
  var key = u + '|' + n;
  ejecutar('update', {
    nro_sol: n, id_g: idG, unidad: u,
    gip:     document.getElementById('gip_' + key).value,
    oc:      document.getElementById('oc_'  + key).value,
    factura: document.getElementById('fac_' + key).value,
    obs:     document.getElementById('obs_' + key).value,
    estado:  document.getElementById('est_' + key).value,
    user:    USUARIO_ACTUAL
  });
  mostrarToast('✅', 'Cambios guardados', n + ' · ' + u + ' · ' + USUARIO_ACTUAL);
}

// ── DESAGRUPAR ──
function desagrupar(n, u) {
  if (confirm('¿Quitar esta solicitud del grupo?')) {
    ejecutar('desagrupar', { nro_sol: n, unidad: u, user: USUARIO_ACTUAL });
  }
}

// ── NUEVA SOLICITUD ──
function toggleCarga() {
  var f = document.getElementById('form-carga');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}
function cargarCheckboxes(lista) {
  document.getElementById('check-mats').innerHTML =
    lista.map(function(m){ return '<label><input type="checkbox" value="' + m + '"> ' + m + '</label>'; }).join('');
}
function enviarNueva() {
  var nro  = document.getElementById('c_nro').value.trim();
  var fSol = document.getElementById('c_f_sol').value;
  var fNec = document.getElementById('c_f_nec').value;
  if (!nro || !fSol || !fNec) {
    mostrarToast('⚠️','Campos incompletos','Complete N° Solicitud, Fecha Solicitud y Fecha Necesidad.');
    return;
  }
  var mats = Array.from(document.querySelectorAll('#check-mats input:checked')).map(function(c){ return c.value; }).join(', ');
  ejecutar('create', {
    nro_sol: nro,
    unidad:  document.getElementById('c_unidad').value,
    activo:  mats,
    f_sol:   fSol,
    f_nec:   fNec,
    detalle: document.getElementById('c_det').value,
    motivo:  document.getElementById('c_mot').value,
    user:    USUARIO_ACTUAL
  });
  mostrarToast('✅','Solicitud creada', nro + ' · ' + document.getElementById('c_unidad').value);
  toggleCarga();
}

// ── AGRUPAR ──
function crearGrupo() {
  var checks = Array.from(document.querySelectorAll('.check-agrupar:checked')).map(function(c){ return c.value; });
  if (checks.length < 2) {
    mostrarToast('⚠️','Selección inválida','Seleccione al menos 2 solicitudes para agrupar.');
    return;
  }
  var nom = prompt('Nombre del grupo:');
  if (nom && nom.trim()) {
    ejecutar('agrupar', { ids: checks.join(','), nombre_grupo: nom.trim(), user: USUARIO_ACTUAL });
  }
}

// ── EJECUTAR (JSONP limpio) ──
function ejecutar(act, par) {
  setLoading(true);
  limpiarScriptPendiente();
  var url = WEB_APP_URL + '?action=' + act + '&callback=renderTotal&_t=' + Date.now();
  for (var k in par) url += '&' + k + '=' + encodeURIComponent(par[k]);
  var s = document.createElement('script');
  s.src = url;
  s.onerror = function(){ setLoading(false); mostrarToast('❌','Error de red','No se pudo completar la operación.'); };
  document.body.appendChild(s);
  _pendingScript = s;
}

// ── FILTRAR ──
function filtrar() {
  var uEl = document.getElementById('f_unidad');
  var u   = uEl ? uEl.value : '';
  var t   = document.getElementById('f_texto').value.toLowerCase();
  var ok  = Array.from(document.querySelectorAll('.f-estado:checked')).map(function(c){ return c.value; });

  document.querySelectorAll('.fila-data').forEach(function(f) {
    var mU = !u || f.dataset.unidad === u;
    var mE = ok.indexOf(f.dataset.estado) > -1;
    var mT = !t || f.dataset.txt.includes(t);
    f.style.display = (mU && mE && mT) ? '' : 'none';
  });
  document.querySelectorAll('.group-box').forEach(function(gb) {
    var vis = Array.from(gb.querySelectorAll('.fila-data')).some(function(r){ return r.style.display !== 'none'; });
    gb.style.display = vis ? '' : 'none';
  });
}

// ── SEMÁFORO solicitudes (retorna clase CSS) ──
function getSemaforo(fStr) {
  if (!fStr || fStr === '-' || fStr === '') return 'fecha-ok';
  var p = String(fStr).split('-');
  if (p.length !== 3) return 'fecha-ok';
  // formato dd-mm-yyyy
  var venc = new Date(Number(p[2]), Number(p[1]) - 1, Number(p[0]));
  if (isNaN(venc.getTime())) return 'fecha-ok';
  var diff = Math.ceil((venc - new Date()) / 86400000);
  if (diff < 0)   return 'fecha-vencida';
  if (diff <= 45) return 'fecha-aviso';
  return 'fecha-ok';
}

// ── SEMÁFORO flota (retorna clase CSS) ──
function getSemaforoFlota(fStr) {
  return getSemaforo(fStr); // misma lógica
}

// ── TOAST ──
function mostrarToast(icon, titulo, sub) {
  document.getElementById('toast-icon').innerText  = icon;
  document.getElementById('toast-title').innerText = titulo;
  document.getElementById('toast-sub').innerText   = sub || '';
  var t = document.getElementById('toast');
  t.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

// ── LOADING ──
function setLoading(v) {
  document.getElementById('loading-overlay').classList.toggle('show', v);
}
</script>
