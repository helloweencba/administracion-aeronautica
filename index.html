<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Aeronáutica Córdoba</title>
    <style>
        :root { --azul: #1a5276; --celeste: #2980b9; --naranja: #e67e22; --verde: #27ae60; --rojo: #c0392b; --fondo: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); margin: 0; padding: 10px; font-size: 14px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 4px solid var(--azul); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        label { font-weight: bold; font-size: 0.75em; color: var(--azul); display: block; margin-bottom: 3px; }
        input, select, textarea { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85em; box-sizing: border-box; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-main { background: var(--azul); width: 100%; margin-top: 15px; padding: 12px; }
        
        /* Flota */
        .flota-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .flota-card { min-width: 180px; padding: 10px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 0.8em; line-height: 1.4; }
        .vence-rojo { border-left: 5px solid var(--rojo); background: #fff5f5; }
        .vence-amarillo { border-left: 5px solid #f1c40f; background: #fffdf0; }
        .vence-verde { border-left: 5px solid var(--verde); background: #f5fff5; }

        /* Tabla y Trazabilidad */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--azul); color: white; font-size: 0.7em; padding: 8px; text-transform: uppercase; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 8px; font-size: 0.75em; vertical-align: top; }
        .row-grupo { background-color: #fff4e6 !important; border-left: 6px solid var(--naranja) !important; }
        .badge-ur { background: #ebf5fb; color: #2874a6; padding: 2px 5px; border-radius: 4px; font-weight: bold; font-size: 0.8em; margin-right: 5px; border: 1px solid #aed6f1; }
        .badge-grupo { background: var(--naranja); color: white; padding: 2px 6px; border-radius: 10px; font-size: 0.7em; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        .alerta-45 { background: #fff9c4; font-weight: bold; }
        .vencido { background: #ffcdd2; color: #b71c1c; font-weight: bold; }
        .chk-col { display: none; }

        /* Campos de texto en tabla */
        .obs-input { width: 100%; margin-top: 5px; min-height: 40px; font-family: inherit; border: 1px dashed #bbb; resize: vertical; }
        
        /* Selector de Activos */
        .multi-select-wrapper { grid-column: span 2; }
        .multi-select { height: 100px; overflow-y: scroll; border: 1px solid #ccc; padding: 8px; background: #fafafa; border-radius: 4px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .multi-select div { display: flex; align-items: center; font-size: 0.85em; }
        .multi-select input { width: auto; margin-right: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚦 Vencimientos de Flota</h2>
    <div class="flota-container" id="panelFlota">Cargando flota...</div>
</div>

<div class="card">
    <h2>🚀 Nueva Solicitud</h2>
    <div class="grid">
        <div><label>Unidad (UR)</label><select id="unidad"><option>TÉCNICA</option><option>OPERACIONES</option><option>UOTA</option><option>ADMINISTRACIÓN</option></select></div>
        <div><label>N° Solicitud</label><input type="text" id="nro_sol"></div>
        <div><label>Fecha Necesidad</label><input type="date" id="f_nec"></div>
        <div><label>GIP / Anticipo / Exp.</label><input type="text" id="gip"></div>
        <div class="multi-select-wrapper">
            <label>Aeronaves / Vehículos involucrados</label>
            <div class="multi-select" id="listaActivos"></div>
        </div>
        <div style="grid-column: span 4;"><label>Detalle Técnico</label><textarea id="detalle" style="height:40px"></textarea></div>
    </div>
    <button class="btn btn-main" onclick="registrarSolicitud()">REGISTRAR EN SISTEMA</button>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2>📋 Trazabilidad</h2>
        <div style="display: flex; gap: 5px;">
            <select id="filtroUR" onchange="filtrarTabla()" style="width: 120px; background: #ebf5fb; font-weight: bold;">
                <option value="">TODAS LAS UR</option>
                <option value="TÉCNICA">TÉCNICA</option>
                <option value="OPERACIONES">OPERACIONES</option>
                <option value="UOTA">UOTA</option>
                <option value="ADMINISTRACIÓN">ADMIN</option>
            </select>
            <input type="text" id="busqueda" placeholder="🔍 Buscar..." onkeyup="filtrarTabla()" style="width: 130px;">
            <button class="btn" style="background:var(--naranja)" onclick="toggleModoGrupo()">AGRUPAR</button>
            <button id="btnUnificar" class="btn" style="background:var(--verde); display:none;" onclick="ejecutarUnificacion()">UNIFICAR</button>
        </div>
    </div>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th class="chk-col">Sel</th>
                    <th>UR / Solicitud / Activo</th>
                    <th>Detalle / Observaciones</th>
                    <th>Proveedor / OC</th>
                    <th>Factura / $</th>
                    <th>Estado</th>
                    <th>OK</th>
                </tr>
            </thead>
            <tbody id="cuerpoSol"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyx7Orm7juZn5xAgJcwZKgqMmEdvX_PZdabUwkJzO9wdh0aE703v1mM8d-9ejsVdD07/exec"; 
    const ACTIVOS = ["LV-IHM (C206)", "LV-BFC (AT802)", "LV-CDE (AT802)", "LV-KOW (AT802)", "LV-BIU (AT802)", "LV-WHY (FireBoss)", "LQ-HBQ (LearJet)", "LQ-BAN (B350)", "LQ-COQ (B3)", "LQ-COP (B3)", "LQ-KOP (B3)", "LQ-KDO (H145)", "AE875UX (C.Blanco)", "FAK619 (C.Amarillo)", "AD150QB", "IXH694"];

    window.onload = () => {
        const divActivos = document.getElementById('listaActivos');
        ACTIVOS.forEach(a => divActivos.innerHTML += `<div><input type="checkbox" class="chk-activo" value="${a}"> ${a}</div>`);
        cargarDatos();
    };

    async function cargarDatos() {
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();
        renderFlota(data.flota);
        renderSolicitudes(data.solicitudes);
    }

    function fmt(fecha) { return (fecha && typeof fecha === 'string') ? fecha.substring(0, 10) : (fecha || '-'); }

    function parseFechaArg(str) {
        if(!str || typeof str !== 'string') return new Date();
        const parts = str.split('/');
        if(parts.length < 3) return new Date();
        return new Date(parts[2], parts[1]-1, parts[0]);
    }

    function renderFlota(flota) {
        const container = document.getElementById('panelFlota'); container.innerHTML = '';
        const hoy = new Date();
        flota.forEach(v => {
            const dItv = Math.ceil((parseFechaArg(v.itv) - hoy) / 86400000);
            const est = dItv < 0 ? 'vence-rojo' : (dItv < 30 ? 'vence-amarillo' : 'vence-verde');
            container.innerHTML += `
                <div class="flota-card ${est}">
                    <strong>${v.patente}</strong><br>
                    ITV: ${fmt(v.itv)}<br>
                    POV: ${fmt(v.pov)}<br>
                    CIST: ${fmt(v.cisterna)}<br>
                    <button onclick="editarVencimiento('${v.patente}')" style="font-size:10px; cursor:pointer; margin-top:5px;">ACTUALIZAR</button>
                </div>`;
        });
    }

    function renderSolicitudes(sols) {
        const cuerpo = document.getElementById('cuerpoSol'); cuerpo.innerHTML = '';
        const hoy = new Date();
        sols.reverse().forEach(s => {
            const isFin = s.finalizado === "SI";
            const diff = Math.ceil((parseFechaArg(s.f_nec) - hoy) / 86400000);
            let alerta = (!isFin && s.f_nec) ? (diff < 0 ? 'vencido' : (diff <= 45 ? 'alerta-45' : '')) : '';
            
            cuerpo.innerHTML += `
                <tr class="${s.id_grupo ? 'row-grupo' : ''} ${alerta}">
                    <td class="chk-col"><input type="checkbox" class="chk-sel" value="${s.nro_sol}"></td>
                    <td><span class="badge-ur">${s.unidad}</span> <strong>${s.nro_sol}</strong><br><small>${s.activo}</small>${s.id_grupo ? `<br><span class="badge-grupo" onclick="desagrupar('${s.nro_sol}')">${s.nombre_grupo} ✖</span>` : ''}</td>
                    <td>
                        ${s.detalle}<br><small><b>Necesidad:</b> ${fmt(s.f_nec)}</small>
                        <textarea id="obs_${s.nro_sol}" class="obs-input" placeholder="Ej: Exp. en Tribunal de Cuentas..." ${isFin?'disabled':''}>${s.observaciones||''}</textarea>
                    </td>
                    <td>
                        <input type="text" id="prov_${s.nro_sol}" placeholder="Proveedor" value="${s.prov||''}" ${isFin?'disabled':''}>
                        <input type="text" id="oc_${s.nro_sol}" placeholder="N° OC" value="${s.oc||''}" ${isFin?'disabled':''}>
                    </td>
                    <td>
                        <input type="text" id="fac_${s.nro_sol}" placeholder="Factura" value="${s.nro_factura||''}" ${isFin?'disabled':''}>
                        <input type="number" id="imp_${s.nro_sol}" placeholder="Importe $" value="${s.importe||''}" ${isFin?'disabled':''}>
                    </td>
                    <td>
                        <select id="sel_${s.nro_sol}" ${isFin?'disabled':''}>
                            <option value="NO" ${s.entregado==='NO'?'selected':''}>PENDIENTE</option>
                            <option value="SI" ${s.entregado==='SI'?'selected':''}>ENTREGADO</option>
                            <option value="STOCK" ${s.entregado==='STOCK'?'selected':''}>STOCK</option>
                        </select>
                    </td>
                    <td>${!isFin ? `<button class="btn" style="background:var(--verde)" onclick="actualizar('${s.nro_sol}','${s.id_grupo||''}')">OK</button>` : '✅'}</td>
                </tr>`;
        });
    }

    async function actualizar(nro, idG) {
        const modo = document.getElementById(`sel_${nro}`).value;
        const obs = document.getElementById(`obs_${nro}`).value;
        let p = { 
            action: "update", 
            nro_sol: nro, 
            id_grupo: idG, 
            update_block: false, 
            prov: document.getElementById(`prov_${nro}`).value, 
            oc: document.getElementById(`oc_${nro}`).value, 
            nro_factura: document.getElementById(`fac_${nro}`).value, 
            importe: document.getElementById(`imp_${nro}`).value, 
            entregado: modo,
            observaciones: obs
        };
        if(idG && confirm("¿Aplicar cambios a todo el grupo unificado?")) p.update_block = true;
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
        cargarDatos();
    }

    function filtrarTabla() {
        const bus = document.getElementById('busqueda').value.toUpperCase();
        const ur = document.getElementById('filtroUR').value.toUpperCase();
        const filas = document.querySelectorAll('#cuerpoSol tr');
        filas.forEach(f => {
            const txt = f.innerText.toUpperCase();
            f.style.display = (txt.includes(bus) && (ur === "" || txt.includes(ur))) ? "" : "none";
        });
    }

    async function registrarSolicitud() {
        const selects = Array.from(document.querySelectorAll('.chk-activo:checked')).map(c => c.value);
        if(selects.length === 0) return alert("Seleccione al menos un activo.");
        if(!document.getElementById('nro_sol').value) return alert("Ingrese N° de solicitud.");
        
        const d = { 
            unidad: document.getElementById('unidad').value, 
            nro_sol: document.getElementById('nro_sol').value, 
            f_nec: document.getElementById('f_nec').value, 
            gip: document.getElementById('gip').value, 
            activo: selects.join(", "), 
            detalle: document.getElementById('detalle').value, 
            f_sol: new Date().toISOString().split('T')[0] 
        };
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        location.reload();
    }

    async function ejecutarUnificacion() {
        const sels = Array.from(document.querySelectorAll('.chk-sel:checked')).map(c => c.value);
        if(sels.length < 2) return alert("Seleccione al menos 2 filas.");
        const nom = prompt("Nombre del grupo (ej: COMPRA REPUESTOS):", "COMPRA UNIFICADA");
        if(!nom) return;
        const idG = "GRP-" + Date.now();
        for(let nro of sels) await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "update", nro_sol: nro, id_grupo: idG, nombre_grupo: nom }) });
        location.reload();
    }

    async function editarVencimiento(patente) {
        const tipo = prompt("¿Qué actualizar? (itv / pov / cisterna):").toLowerCase();
        if(!["itv", "pov", "cisterna"].includes(tipo)) return alert("Tipo no válido.");
        const fecha = prompt("Nueva Fecha (Formato: AAAA-MM-DD):");
        if(fecha) { 
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "update_vencimiento", patente: patente, tipo: tipo, fecha: fecha }) }); 
            cargarDatos(); 
        }
    }

    function toggleModoGrupo() { 
        const cols = document.querySelectorAll('.chk-col'); 
        cols.forEach(c => c.style.display = c.style.display === 'table-cell' ? 'none' : 'table-cell');
        document.getElementById('btnUnificar').style.display = (document.getElementById('btnUnificar').style.display === 'none') ? 'inline-block' : 'none';
    }

    async function desagrupar(nro) {
        if(confirm("¿Quitar esta solicitud del grupo?")) { 
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "update", nro_sol: nro, id_grupo: "", nombre_grupo: "" }) }); 
            cargarDatos(); 
        }
    }
</script>
</body>
</html>
